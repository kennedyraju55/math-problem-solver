<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#118ab2"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="340" width="800" height="10" fill="url(#accent)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#06d6a0" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">✨ KEY FEATURES</text>

  <!-- Row 1: 3 cards -->
  <!-- Card 1: Step-by-Step Solutions -->
  <rect x="30" y="60" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#06d6a0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="90" text-anchor="middle" fill="#06d6a0" font-family="Segoe UI,Arial,sans-serif" font-size="22">📝</text>
  <text x="145" y="113" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Step-by-Step Solutions</text>
  <text x="145" y="132" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Detailed breakdowns with</text>
  <text x="145" y="147" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">work shown + explanations</text>
  <text x="145" y="165" text-anchor="middle" fill="#06d6a0" font-family="Segoe UI,Arial,sans-serif" font-size="9">SolutionStep dataclass</text>

  <!-- Card 2: 6 Math Categories -->
  <rect x="285" y="60" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#118ab2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="90" text-anchor="middle" fill="#118ab2" font-family="Segoe UI,Arial,sans-serif" font-size="22">📊</text>
  <text x="400" y="113" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">6 Math Categories</text>
  <text x="400" y="132" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Algebra • Calculus • Geometry</text>
  <text x="400" y="147" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Statistics • Arithmetic • Trig</text>
  <text x="400" y="165" text-anchor="middle" fill="#118ab2" font-family="Segoe UI,Arial,sans-serif" font-size="9">Auto-detection supported</text>

  <!-- Card 3: Formula Library -->
  <rect x="540" y="60" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#e76f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="90" text-anchor="middle" fill="#e76f51" font-family="Segoe UI,Arial,sans-serif" font-size="22">📐</text>
  <text x="655" y="113" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Built-in Formula Library</text>
  <text x="655" y="132" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">10+ formulas across 4 domains</text>
  <text x="655" y="147" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">with LaTeX representations</text>
  <text x="655" y="165" text-anchor="middle" fill="#e76f51" font-family="Segoe UI,Arial,sans-serif" font-size="9">+ LLM-extended formulas</text>

  <!-- Row 2: 3 cards -->
  <!-- Card 4: Practice Problem Generator -->
  <rect x="30" y="195" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#ffd166" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="225" text-anchor="middle" fill="#ffd166" font-family="Segoe UI,Arial,sans-serif" font-size="22">🏋️</text>
  <text x="145" y="248" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Practice Generator</text>
  <text x="145" y="267" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Generate problems at 3 levels:</text>
  <text x="145" y="282" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">basic → intermediate → advanced</text>
  <text x="145" y="300" text-anchor="middle" fill="#ffd166" font-family="Segoe UI,Arial,sans-serif" font-size="9">With hints and answers</text>

  <!-- Card 5: LaTeX Output -->
  <rect x="285" y="195" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#ef476f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="225" text-anchor="middle" fill="#ef476f" font-family="Segoe UI,Arial,sans-serif" font-size="22">📄</text>
  <text x="400" y="248" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">LaTeX Output Support</text>
  <text x="400" y="267" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Publication-ready notation</text>
  <text x="400" y="282" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">for every solution generated</text>
  <text x="400" y="300" text-anchor="middle" fill="#ef476f" font-family="Segoe UI,Arial,sans-serif" font-size="9">Rendered in Streamlit UI</text>

  <!-- Card 6: Concept Identification -->
  <rect x="540" y="195" width="230" height="115" rx="10" fill="#2a2a4a" stroke="#06d6a0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="225" text-anchor="middle" fill="#06d6a0" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎯</text>
  <text x="655" y="248" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Concepts &amp; Tips</text>
  <text x="655" y="267" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Identifies math concepts used</text>
  <text x="655" y="282" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">and provides study tips</text>
  <text x="655" y="300" text-anchor="middle" fill="#06d6a0" font-family="Segoe UI,Arial,sans-serif" font-size="9">+ related practice problems</text>
</svg>
